<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Киносоветчик </title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="container">
    <h1>Советчик фильмов</h1>
            <p>Введите фразу о свлоем настроение ,и нейросеть подберет вам фильм.</p>

        <form method="POST">
             <textarea
                id="message"
                name="message"
                rows="4"
                placeholder="Describe your mood..."
            >{{ user_text }}</textarea>
            <br>
            <button type="submit">Анализировать</button>
        </form>

        {% if recommendation %}
        <div class="result">
            <h3>Результат:</h3>
            <p>{{ recommendation | safe }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
